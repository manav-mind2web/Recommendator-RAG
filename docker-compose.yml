services:
  db:
    image: pgvector/pgvector:pg16
    container_name: listings-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: listings
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d listings"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
